<!DOCTYPE html>
<!-- Khai báo loại tài liệu HTML5 -->
<html lang="en">
  <!-- Phần head chứa siêu dữ liệu và liên kết CSS -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="./styles/auth.css" />
  </head>
  <!-- Phần body chứa form đăng ký -->
  <body>
    <!-- Bao bọc form đăng ký -->
    <div class="form-wrapper">
      <h2>Sign Up</h2>
      <!-- Form đăng ký với các trường nhập liệu -->
      <form action="#">
        <div class="form-control">
          <input id="username" type="text" required />
          <label>Username</label>
        </div>
        <div class="form-control">
          <input id="email" type="text" required />
          <label>Email address</label>
        </div>
        <div class="form-control">
          <input id="password" type="password" required />
          <label>Password</label>
        </div>
        <button type="submit">Sign Up</button>
        <div class="form-help">
          <div class="remember-me">
            <input type="checkbox" id="remember-me" />
            <label for="remember-me">Remember me</label>
          </div>
          <a href="#">Need help?</a>
        </div>
      </form>
      <!-- Liên kết đến trang đăng nhập -->
      <p>Already have an account? <a href="./login.html">Sign in now</a></p>
    </div>

    <!-- Script xử lý đăng ký -->
    <script src="./scripts/register.js"></script>
  </body>
</html>
